<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบส่งแผนการสอน</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; background-color: #f9f9f9; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:disabled { background-color: #ccc; }
    #status { margin-top: 15px; font-weight: bold; text-align: center; }
  </style>
</head>
<body>

  <h2>📋 ระบบส่งแผนการสอน</h2>
  <form id="planForm">
    <div class="form-group">
      <label>ชื่อ-นามสกุล ผู้สอน:</label>
      <input type="text" id="teacherName" required placeholder="เช่น ครูสมชาย ใจดี">
    </div>
    <div class="form-group">
      <label>รหัสวิชา / ชื่อวิชา:</label>
      <input type="text" id="subject" required placeholder="เช่น ว30101 วิทยาการคำนวณ">
    </div>
    <div class="form-group">
      <label>ลิงก์แผนการสอน (Google Drive/PDF):</label>
      <input type="url" id="planUrl" required placeholder="https://drive.google.com/...">
    </div>
    <button type="submit" id="submitBtn">ส่งแผนการสอน</button>
  </form>

  <div id="status"></div>

  <script>
    // 🔗 ***นำ Web App URL จาก Google Apps Script ใน Step 1 มาวางตรงนี้ครับ***
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQKMtq1Z69ZSAOc-C5mvfgpPnQEeIym4lrG8a03yEDg4svqAicURRc8yUuP5BGYrkj/exec';

    const form = document.getElementById('planForm');
    const statusDiv = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      submitBtn.disabled = true;
      statusDiv.style.color = 'blue';
      statusDiv.innerText = 'กำลังส่งข้อมูล... กรุณารอสักครู่';

      const payload = {
        teacherName: document.getElementById('teacherName').value,
        subject: document.getElementById('subject').value,
        planUrl: document.getElementById('planUrl').value
      };

      // ส่งข้อมูลไปหา Google Apps Script
      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', // สำคัญมาก เพื่อหลีกเลี่ยงปัญหา CORS กับ Apps Script
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(() => {
        statusDiv.style.color = 'green';
        statusDiv.innerText = '✅ ส่งแผนการสอนเรียบร้อยแล้ว!';
        form.reset();
        submitBtn.disabled = false;
      })
      .catch(error => {
        statusDiv.style.color = 'red';
        statusDiv.innerText = '❌ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง';
        console.error('Error:', error);
        submitBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
